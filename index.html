<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻海洋 - Hello World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 星空背景 -->
    <div class="starfield"></div>
    
    <!-- 云层容器 -->
    <div class="cloud-layer">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>
    
    <!-- 主内容 -->
    <div class="content-wrapper">
        <div class="container">
            <h1 class="title">Hello World</h1>
            <p class="welcome-message">欢迎来到梦幻海洋世界</p>
            <button class="cta-button" onclick="showAlert()">探索更多</button>
        </div>
    </div>

    <!-- 海浪效果容器 -->
    <div class="ocean-wrapper">
        <!-- 渐变定义 -->
        <defs>
            <linearGradient id="gradient1" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6" />
                <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.8" />
            </linearGradient>
            <linearGradient id="gradient2" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#0099cc;stop-opacity:0.5" />
                <stop offset="100%" style="stop-color:#006699;stop-opacity:0.7" />
            </linearGradient>
            <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#006699;stop-opacity:0.4" />
                <stop offset="100%" style="stop-color:#003366;stop-opacity:0.6" />
            </linearGradient>
        </defs>
        
        <svg class="wave wave-1" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,50 Q300,0 600,50 T1200,50 L1200,120 L0,120 Z" fill="url(#gradient1)"></path>
        </svg>
        
        <svg class="wave wave-2" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,60 Q300,10 600,60 T1200,60 L1200,120 L0,120 Z" fill="url(#gradient2)"></path>
        </svg>
        
        <svg class="wave wave-3" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,70 Q300,20 600,70 T1200,70 L1200,120 L0,120 Z" fill="url(#gradient3)"></path>
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
